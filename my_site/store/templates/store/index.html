{% extends 'store/base.html' %}

{% block title %}All books{% endblock %}

{% block content %}
    <ul>
        {% for book in books %}
        {% comment %} 'detail' is name of url {% endcomment %}
        <li><a href="{% url 'detail' book.id %}">{{ book.title }}</a></li>
        {% endfor %}
    </ul>
{% endblock %}
