{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Blog Title{% endblock %}</title>
    <link rel="stylesheet" href="{% static "app.css" %}">
    {% block css_files %}{% endblock %}
</head>
<body>
    <header id="main-navigation">
    {% comment %} <h1><a href="{% url "splash" %}">Patrick's blog welcome</a></h1> {% endcomment %}
    <nav>
        <a href="{% url "blogindex" %}">All Posts</a>
    </nav>
    </header>
    {% block content %}{% endblock %}
</body>
</html>
